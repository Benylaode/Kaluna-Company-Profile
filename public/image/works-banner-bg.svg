<svg width="1440" height="260" viewBox="0 0 1440 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Blue Background Gradient -->
  <rect width="1440" height="260" fill="url(#bg-gradient)"/>
  
  <!-- Diagonal Geometric Shapes -->
  <path d="M700 -50 L1200 300 L1000 300 L500 -50 Z" fill="url(#diagonal-grad-1)" opacity="0.15"/>
  <path d="M900 -50 L1400 300 L1250 300 L750 -50 Z" fill="url(#diagonal-grad-2)" opacity="0.25"/>
  <path d="M1100 -50 L1600 300 L1450 300 L950 -50 Z" fill="url(#diagonal-grad-3)" opacity="0.1"/>

  <!-- World Map Dotted Pattern/Globe Mockup -->
  <g opacity="0.15">
    <circle cx="200" cy="80" r="2" fill="#FFFFFF"/>
    <circle cx="220" cy="90" r="3" fill="#FFFFFF"/>
    <circle cx="240" cy="85" r="2" fill="#FFFFFF"/>
    <path d="M120 40 Q 150 50 180 80 T 220 120" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="M140 30 Q 180 60 210 90 T 250 140" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="M450 50 Q 550 40 650 60 T 750 90" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="4,4"/>
    <path d="M480 70 Q 580 60 680 80 T 780 110" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="4,4"/>
    <path d="M510 90 Q 610 80 710 100 T 810 130" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="4,4"/>
  </g>

  <!-- Network / Connection Lines -->
  <g stroke="url(#line-grad)" stroke-width="1" opacity="0.3">
    <line x1="150" y1="50" x2="350" y2="150" />
    <line x1="350" y1="150" x2="600" y2="70" />
    <line x1="600" y1="70" x2="800" y2="180" />
    <line x1="800" y1="180" x2="1100" y2="60" />
    <line x1="1100" y1="60" x2="1300" y2="200" />
    
    <line x1="200" y1="120" x2="350" y2="150" />
    <line x1="350" y1="150" x2="480" y2="40" />
    <line x1="480" y1="40" x2="600" y2="70" />
    <line x1="600" y1="70" x2="720" y2="150" />
    <line x1="720" y1="150" x2="800" y2="180" />
    <line x1="800" y1="180" x2="980" y2="100" />
    <line x1="980" y1="100" x2="1100" y2="60" />
  </g>

  <!-- Glowing Nodes / Points of Light -->
  <g>
    <circle cx="350" cy="150" r="5" fill="#299EED"/>
    <circle cx="350" cy="150" r="12" fill="#299EED" opacity="0.3"/>
    <circle cx="600" cy="70" r="4" fill="#81C3F9"/>
    <circle cx="600" cy="70" r="10" fill="#81C3F9" opacity="0.3"/>
    <circle cx="800" cy="180" r="6" fill="#299EED"/>
    <circle cx="800" cy="180" r="15" fill="#299EED" opacity="0.3"/>
    <circle cx="1100" cy="60" r="5" fill="#299EED"/>
    <circle cx="1100" cy="60" r="12" fill="#299EED" opacity="0.3"/>
  </g>

  <!-- Gradients Definition -->
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1440" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1930" />
      <stop offset="50%" stop-color="#0D2342" />
      <stop offset="100%" stop-color="#050C1A" />
    </linearGradient>
    
    <linearGradient id="diagonal-grad-1" x1="700" y1="-50" x2="1000" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E88E5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1E88E5" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="diagonal-grad-2" x1="900" y1="-50" x2="1250" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#299EED" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#299EED" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="diagonal-grad-3" x1="1100" y1="-50" x2="1450" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1F5DBA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1F5DBA" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="line-grad" x1="0" y1="0" x2="1440" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#299EED" />
      <stop offset="50%" stop-color="#81C3F9" />
      <stop offset="100%" stop-color="#1E88E5" />
    </linearGradient>
  </defs>
</svg>